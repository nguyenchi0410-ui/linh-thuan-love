<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Hợp Đồng Tình Yêu - Linh ❤️ Thuần</title>

<style>
body{
font-family: Arial;
background: linear-gradient(135deg,#ffb6c9,#ffe6f0);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
}

h1{
color:#ff2e63;
font-size:40px;
}

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:10px;
margin:10px;
cursor:pointer;
}

.yes{
background:#ff4d6d;
color:white;
}

.ok{
background:#ff8fab;
color:white;
}

img{
margin-top:20px;
width:250px;
display:none;
}

.heart{
position:fixed;
color:red;
animation:float 4s linear infinite;
}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-800px)}
}
</style>
</head>

<body>

<h1>Linh hết giận rồi 💗</h1>
<p>Thuần có đồng ý gia hạn hợp đồng tình yêu không?</p>

<button class="yes" onclick="acceptLove()">Anh đồng ý 💍</button>
<button class="ok" onclick="acceptLove()">Anh OK 😆</button>

<br>

<img id="hug" src="https://media.tenor.com/6XKJ3yJz2V8AAAAi/cute-hug.gif">

<audio id="music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<script>

function acceptLove(){

document.getElementById("hug").style.display="block";

document.getElementById("music").play();

for(let i=0;i<30;i++){

let heart=document.createElement("div");

heart.innerHTML="❤️";

heart.className="heart";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(20+Math.random()*30)+"px";

document.body.appendChild(heart);

}

}

</script>

</body>
</html>
